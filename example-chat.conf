;========================================================================
; chat.conf — Configurações do IRC-GPT Bot (v1.3.3)
;========================================================================

[openai]
; Sua chave de API OpenAI (obrigatório)
api_key            = sk-proj-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

;========================================================================
; Parâmetros de ChatCompletion
;========================================================================
[chatcompletion]
; Modelo de chat (ver lista de modelos suportados no código)
model              = gpt-4o

; Prompt inicial (role=system)
context            = Você é Terminator, um assistente de IRC direto, eficiente e confiante, com humor seco e sarcasmo leve quando couber; responda de forma clara, objetiva e natural, sem exagero, sem teatrinho, sem bajulação, sem introduções simpáticas e sem soar como atendente educado demais.

; Controle de geração
temperature        = 0.9      ; 0.0 (determinístico) a 2.0 (muito aleatório)
max_tokens         = 12000    ; limite de tokens na resposta
top_p              = 1        ; nucleus sampling (0.0–1.0)
frequency_penalty  = 0        ; penaliza repetições (-2.0 a 2.0)
presence_penalty   = 0        ; incentiva novos tópicos (-2.0 a 2.0)

; Timeouts
request_timeout    = 60       ; em segundos, para chamadas HTTP

;========================================================================
; Configurações de IRC
;========================================================================
[irc]
server             = irc.redesul.org
port               = 6697     ; 6697 para TLS, 6667 sem TLS
ssl                = true     ; true = SSL/TLS on, false = plain TCP

channels           = #warez,#bot,#ajuda
nickname           = Terminator
ident              = AI
realname           = Bot de inteligência artificial, sob o ChatGPT.
password           =          ; opcional: senha SERVIDOR ou NickServ

; Verbosidade
debug              = true     ; true = logs INFO/DEBUG no console (não grava em arquivo)
raw                = false    ; true = dump de todo tráfego IRC cru no console

;========================================================================
; Comandos e Limites
;========================================================================
[bot]
log_file           = gptirc.log                 ; usado em modo daemon (debug=false)

; Histórico de conversas
history_limit      = 25       ; quantas mensagens mantemos por target para contexto

; Detecção de bursts para síntese de contexto
burst_threshold    = 20       ; nº de msgs em burst_window para acionar resumo
burst_window       = 60       ; janela (segundos) para contar msgs de burst
burst_chunk_size   = 20       ; limite de msgs enviadas ao resumo

; Persistência de uso de tokens/custo
usage_db           = usage.db ; SQLite para tokens diários e mensais
monthly_start_day  = 1        ; dia do mês (1–28) em que zera o contador mensal
context_mode       = channelcontext
history_limit_direct = 8
history_limit_channelcontext = 12
channel_history_max_chars = 200
assistant_history_max_chars = 180
question_history_max_chars = 250
ignore_short_channel_msgs = true

[rate_limit]
max_messages       = 5

;========================================================================
; FIM das configurações
;========================================================================
