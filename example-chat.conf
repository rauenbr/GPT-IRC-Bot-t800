;========================================================================
; chat.conf — Configurações do IRC-GPT Bot (v1.3.3)
;========================================================================

[openai]
; Sua chave de API OpenAI (obrigatório)
api_key            = sk-proj-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

;========================================================================
; Parâmetros de ChatCompletion
;========================================================================
[chatcompletion]
; Modelo de chat (ver lista de modelos suportados no código)
model              = gpt-4o

; Prompt inicial (role=system)
context            = Você é Terminator, um assistente de IRC direto, eficiente e confiante, com humor seco e sarcasmo leve quando couber; responda de forma clara, objetiva e natural, sem exagero, sem teatrinho, sem bajulação, sem introduções simpáticas e sem soar como atendente educado demais.

; Controle de geração
; 0.0 (determinístico) a 2.0 (muito aleatório)
temperature        = 0.9
; limite de tokens na resposta
max_tokens         = 12000
; nucleus sampling (0.0–1.0)
top_p              = 1
; penaliza repetições (-2.0 a 2.0)
frequency_penalty  = 0
; incentiva novos tópicos (-2.0 a 2.0)
presence_penalty   = 0

; Timeouts
; em segundos, para chamadas HTTP
request_timeout    = 60

;========================================================================
; Configurações de IRC
;========================================================================
[irc]
server             = irc.redesul.org
; 6697 para TLS, 6667 sem TLS
port               = 6697
; true = SSL/TLS on, false = plain TCP
ssl                = true

channels           = #warez,#bot,#ajuda
nickname           = Terminator
ident              = AI
realname           = Bot de inteligência artificial, sob o ChatGPT.
; opcional: senha SERVIDOR ou NickServ
password           =

; Verbosidade
; true = logs INFO/DEBUG no console (não grava em arquivo)
debug              = true
; true = dump de todo tráfego IRC cru no console
raw                = false

;========================================================================
; Comandos e Limites
;========================================================================
[bot]
; usado em modo daemon (debug=false)
log_file           = gptirc.log

; Histórico de conversas
; quantas mensagens mantemos por target para contexto
history_limit      = 25

; Detecção de bursts para síntese de contexto
; nº de msgs em burst_window para acionar resumo
burst_threshold    = 20
; janela (segundos) para contar msgs de burst
burst_window       = 60
; limite de msgs enviadas ao resumo
burst_chunk_size   = 20

; Persistência de uso de tokens/custo
; SQLite para tokens diários e mensais
usage_db           = usage.db
; dia do mês (1–28) em que zera o contador mensal
monthly_start_day  = 1
context_mode       = channelcontext
history_limit_direct = 8
history_limit_channelcontext = 12
channel_history_max_chars = 200
assistant_history_max_chars = 180
question_history_max_chars = 250
ignore_short_channel_msgs = true

[rate_limit]
max_messages       = 5

;========================================================================
; FIM das configurações
;========================================================================
